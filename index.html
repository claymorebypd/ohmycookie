<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oh My Cookie | Handcrafted Cookies & Cakes Stockholm</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #FDFBF7;
            overflow-x: hidden;
        }

        .animate-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .cookie-card:hover .product-media { transform: scale(1.08); }
        .product-media { transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .nav-blur {
            backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.85);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 163, 115, 0.15);
        }

        .mesh-gradient {
            background-color: #FDFBF7;
            background-image: 
                radial-gradient(at 0% 0%, rgba(212, 163, 115, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(74, 55, 40, 0.05) 0px, transparent 50%);
        }

        .btn-hover {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @media (hover: hover) {
            .btn-hover:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px -10px rgba(74, 55, 40, 0.3);
            }
        }
        
        .mobile-menu-enter { transform: translateX(100%); }
        .mobile-menu-active { transform: translateX(0); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        #qrcode img {
            margin: auto;
        }
    </style>
</head>
<body class="mesh-gradient text-[#4A3728]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const CookieSVG = ({ color = "#D4A373", className = "" }) => (
            <svg viewBox="0 0 200 200" className={className} xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="100" r="85" fill={color} fillOpacity="0.1" />
                <path d="M100 20 C 150 20, 180 50, 180 100 C 180 150, 150 180, 100 180 C 50 180, 20 150, 20 100 C 20 50, 50 20, 100 20" fill={color} />
                <circle cx="70" cy="65" r="10" fill="#4A3728" opacity="0.4" />
                <circle cx="130" cy="80" r="12" fill="#4A3728" opacity="0.4" />
                <circle cx="95" cy="120" r="9" fill="#4A3728" opacity="0.4" />
                <circle cx="145" cy="130" r="7" fill="#4A3728" opacity="0.4" />
                <circle cx="60" cy="135" r="11" fill="#4A3728" opacity="0.4" />
            </svg>
        );

        const ProductImage = ({ src, color, alt, className = "" }) => {
            const [error, setError] = useState(false);
            if (!src || error) {
                return <CookieSVG color={color} className={className} />;
            }
            return (
                <img 
                    src={src} 
                    alt={alt} 
                    className={`${className} object-cover w-full h-full`}
                    onError={() => setError(true)}
                />
            );
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name.toLowerCase());
                    if (className) iconElement.setAttribute('class', className);
                    iconElement.style.width = `${size}px`;
                    iconElement.style.height = `${size}px`;
                    containerRef.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        attrs: { width: size, height: size, 'stroke-width': 2, stroke: 'currentColor' },
                        nameAttr: 'data-lucide',
                        icons: window.lucide.icons,
                        root: containerRef.current
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }} />;
        };

        const COOKIES = [
            { id: 'raspberry-white', name: 'Raspberry White Choco', desc: 'Tangy Swedish raspberries paired with premium creamy white chocolate chunks.', price: 38, color: '#E5989B', tag: 'New', imageSrc: 'images/cookies/raspberry-white.jpg' },
            { id: 'pistachio', name: 'Pistachio Cookie', desc: 'Rich roasted pistachio dough with a silky pistachio cream center.', price: 42, color: '#B5C99A', tag: 'Best Seller', imageSrc: 'images/cookies/pistachio.jpg' },
            { id: 'biscoff-white', name: 'Biscoff White Choco', desc: 'Caramelized Biscoff spread core topped with white chocolate drizzles.', price: 38, color: '#D4A373', tag: 'Best Seller', imageSrc: 'images/cookies/biscoff.jpg' },
            { id: 'brown-butter', name: 'Brown Butter Choco', desc: 'Nutty brown butter dough loaded with 70% dark chocolate chunks and sea salt.', price: 35, color: '#8B5E3C', tag: 'The Classic', imageSrc: 'images/cookies/brown-butter.jpg' },
            { id: 'red-velvet', name: 'Red Velvet Cheesecake', desc: 'Vibrant cocoa dough with a thick, tangy cream cheese frosting filling.', price: 40, color: '#A4161A', tag: 'Must Try', imageSrc: 'images/cookies/red-velvet.jpg' }
        ];

        const CAKES = [
            { id: 'kunafa-jar', name: 'Kunafa Jar Cake', desc: 'A fusion of crunchy kataifi and sweet cream layers.', price: 75, color: '#E9C46A', tag: 'New', imageSrc: 'images/cakes/kunafa-jar.jpg' },
            { id: 'saffron-tiramisu', name: 'Saffron Tiramisu', desc: 'A Swedish twist on the Italian classic with golden saffron notes.', price: 85, color: '#F4A261', tag: 'Signature', imageSrc: 'images/cakes/saffron-tiramisu.jpg' },
            { id: 'rum-cake', name: 'Dark Rum Cake', desc: 'Dark and decadent butter cake infused with premium rum.', price: 65, color: '#264653', tag: 'Specialty', imageSrc: 'images/cakes/rum-cake.jpg' },
            { id: 'strawberry-jar', name: 'Strawberry Jar Cake', desc: 'Fresh, light sponge layered with Swedish strawberries and cream.', price: 75, color: '#EF476F', tag: 'Light', imageSrc: 'images/cakes/strawberry-jar.jpg' },
            { id: 'choco-lava', name: 'Choco Lava Cake', desc: 'The ultimate warm-centered dessert for the true chocolate lover.', price: 60, color: '#1D1D1D', tag: 'Warm', imageSrc: 'images/cakes/choco-lava.jpg' }
        ];

        const BOX_OPTIONS = [
            { size: 5, price: 165, title: 'The Taster Box', label: 'Box of 5', savings: 'Save 10%', imageSrc: 'images/boxes/taster.jpg' },
            { size: 7, price: 225, title: 'The Weekender', label: 'Box of 7', savings: 'Save 15%', imageSrc: 'images/boxes/weekender.jpg' },
            { size: 10, price: 295, title: 'The Fika Set', label: 'Box of 10', savings: 'Save 20%', imageSrc: 'images/boxes/fika-set.jpg' }
        ];

        const TESTIMONIALS = [
            { name: "Sofia H.", text: "Best fika in Stockholm, hands down. The Pistachio Cream is literal magic.", handle: "@sofia_fika" },
            { name: "Erik L.", text: "Finally a cookie that isn't just sweet but has actual depth. Brown butter makes it.", handle: "@erik_bakes" },
            { name: "Maja W.", text: "Building my own box is so addictive. Perfect for office Friday snacks!", handle: "@maja_sthlm" }
        ];

        const QRCodeGenerator = ({ url }) => {
            const qrRef = useRef(null);

            useEffect(() => {
                if (qrRef.current) {
                    qrRef.current.innerHTML = '';
                    new QRCode(qrRef.current, {
                        text: url,
                        width: 140,
                        height: 140,
                        colorDark: "#4A3728",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
            }, [url]);

            return <div ref={qrRef} id="qrcode" className="flex justify-center p-2 bg-white rounded-lg"></div>;
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [cart, setCart] = useState([]);
            const [selectedBoxSize, setSelectedBoxSize] = useState(null);
            const [currentBox, setCurrentBox] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [showCookieBanner, setShowCookieBanner] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                const consent = localStorage.getItem('cookie-consent');
                if (!consent) setTimeout(() => setShowCookieBanner(true), 1500);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navigate = (to, sectionId = null) => {
                setIsMobileMenuOpen(false);
                
                if (sectionId) {
                    if (view !== 'home') {
                        setView('home');
                        setTimeout(() => {
                            const el = document.getElementById(sectionId);
                            if (el) el.scrollIntoView({ behavior: 'smooth' });
                        }, 150);
                    } else {
                        const el = document.getElementById(sectionId);
                        if (el) el.scrollIntoView({ behavior: 'smooth' });
                    }
                } else {
                    setView(to);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            const totalPrice = useMemo(() => cart.reduce((sum, item) => sum + (item.price * item.quantity), 0), [cart]);
            const totalItemsCount = useMemo(() => cart.reduce((sum, item) => sum + item.quantity, 0), [cart]);

            const addToCart = (name, price) => {
                setCart(prev => {
                    const exists = prev.find(i => i.name === name);
                    if (exists) return prev.map(i => i.name === name ? { ...i, quantity: i.quantity + 1 } : i);
                    return [...prev, { id: Math.random(), name, price, quantity: 1 }];
                });
                setIsCartOpen(true);
            };

            const updateQuantity = (id, delta) => {
                setCart(prev => prev.map(i => i.id === id ? { ...i, quantity: Math.max(0, i.quantity + delta) } : i).filter(i => i.quantity > 0));
            };

            const addBoxToCart = () => {
                const opt = BOX_OPTIONS.find(b => b.size === selectedBoxSize);
                setCart([...cart, { id: Math.random(), name: opt.title, items: [...currentBox], price: opt.price, quantity: 1 }]);
                setSelectedBoxSize(null);
                setCurrentBox([]);
                setIsCartOpen(true);
            };

            const navItems = [
                { id: 'home', label: 'Home' },
                { id: 'cookies', label: 'Cookies', section: 'cookies-section' },
                { id: 'cakes', label: 'Cakes & Jars' },
                { id: 'shop', label: 'Build Box' },
                { id: 'about', label: 'About' }
            ];

            return (
                <div className={`min-h-screen flex flex-col selection:bg-[#D4A373] selection:text-white ${isMobileMenuOpen || isCartOpen ? 'overflow-hidden' : ''}`}>
                    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 px-4 md:px-12 ${scrolled ? 'py-3 nav-blur shadow-sm' : 'py-6 md:py-8 bg-transparent'}`}>
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 md:gap-3 cursor-pointer group" onClick={() => navigate('home')}>
                                <div className="bg-[#4A3728] p-1.5 md:p-2 rounded-xl group-hover:rotate-12 transition-transform">
                                    <Icon name="Cookie" size={18} className="text-white md:w-[20px] md:h-[20px]" />
                                </div>
                                <span className="font-black text-lg md:text-xl tracking-tighter uppercase text-[#4A3728]">
                                    ohmycookie<span className="text-[#D4A373]">.se</span>
                                </span>
                            </div>

                            <div className="hidden lg:flex gap-8">
                                {navItems.map(item => (
                                    <button 
                                        key={item.id}
                                        onClick={() => navigate(item.id, item.section)}
                                        className={`text-[11px] font-black uppercase tracking-[0.2em] transition-colors ${view === item.id ? 'text-[#D4A373]' : 'text-[#4A3728]/60 hover:text-[#4A3728]'}`}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </div>

                            <div className="flex items-center gap-2 md:gap-4">
                                <button 
                                    onClick={() => setIsCartOpen(true)}
                                    className="relative w-10 h-10 md:w-12 md:h-12 glass-panel rounded-xl md:rounded-2xl flex items-center justify-center hover:scale-105 transition-transform"
                                >
                                    <Icon name="ShoppingBag" size={18} className="md:w-[20px] md:h-[20px]" />
                                    {totalItemsCount > 0 && (
                                        <span className="absolute -top-1 -right-1 bg-[#D4A373] text-white text-[9px] font-black w-4 h-4 md:w-5 md:h-5 rounded-full flex items-center justify-center ring-2 ring-white">
                                            {totalItemsCount}
                                        </span>
                                    )}
                                </button>
                                
                                <button 
                                    onClick={() => setIsMobileMenuOpen(true)}
                                    className="lg:hidden w-10 h-10 glass-panel rounded-xl flex items-center justify-center"
                                >
                                    <Icon name="Menu" size={18} />
                                </button>
                            </div>
                        </div>
                    </nav>

                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 z-[100] bg-[#4A3728] text-white flex flex-col p-8 md:p-12 animate-in">
                            <div className="flex justify-between items-center mb-16">
                                <span className="font-black text-xl tracking-tighter uppercase">ohmycookie<span className="text-[#D4A373]">.se</span></span>
                                <button onClick={() => setIsMobileMenuOpen(false)} className="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center">
                                    <Icon name="X" size={24} />
                                </button>
                            </div>
                            <div className="flex flex-col gap-8">
                                {navItems.map((item, idx) => (
                                    <button 
                                        key={item.id}
                                        onClick={() => navigate(item.id, item.section)}
                                        className="text-4xl md:text-6xl font-black text-left tracking-tighter hover:text-[#D4A373] transition-colors"
                                        style={{ animationDelay: `${idx * 0.1}s` }}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </div>
                            <div className="mt-auto pt-10 border-t border-white/5 space-y-4">
                                <p className="text-[#A09184] text-xs font-bold uppercase tracking-widest">Stockholm, Sweden</p>
                                <div className="flex gap-4">
                                    <Icon name="Instagram" size={20} className="text-[#A09184]" />
                                    <Icon name="Facebook" size={20} className="text-[#A09184]" />
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="flex-grow pt-24 md:pt-32 pb-12 md:pb-20 px-4 md:px-6">
                        {view === 'home' && (
                            <div className="max-w-7xl mx-auto space-y-20 md:space-y-32">
                                <header className="relative bg-[#4A3728] rounded-[2.5rem] md:rounded-[5rem] overflow-hidden p-8 md:p-24 min-h-[500px] md:min-h-[600px] flex items-center">
                                    <div className="absolute top-0 right-0 w-1/2 h-full opacity-10 pointer-events-none hidden md:block">
                                        <CookieSVG color="#FFFFFF" className="w-full h-full scale-150 rotate-12" />
                                    </div>
                                    <div className="relative z-10 max-w-2xl space-y-6 md:space-y-8 animate-in text-center md:text-left mx-auto md:mx-0">
                                        <div className="inline-block px-4 py-1.5 rounded-full bg-white/10 text-[9px] md:text-[10px] font-black uppercase tracking-[0.3em] text-[#D4A373]">Stockholm Bakery</div>
                                        <h1 className="text-4xl sm:text-5xl md:text-8xl font-black text-white leading-[1.1] md:leading-[0.9] tracking-tighter">
                                            THE ART <br className="hidden md:block"/>OF THE <br className="hidden md:block"/><span className="italic font-light text-[#D4A373]">Perfect</span> CRUNCH.
                                        </h1>
                                        <p className="text-[#A09184] text-base md:text-lg max-w-sm mx-auto md:mx-0 leading-relaxed">Handcrafted cookies and specialty jar cakes. Fresh fika delivered across Stockholm.</p>
                                        <div className="flex flex-col sm:flex-row gap-3 md:gap-4 pt-4 md:pt-6">
                                            <button onClick={() => navigate('shop')} className="w-full sm:w-auto px-10 py-5 bg-[#D4A373] text-white rounded-2xl font-black text-xs uppercase tracking-widest btn-hover">Build Your Box</button>
                                            <button onClick={() => navigate('home', 'cookies-section')} className="w-full sm:w-auto px-10 py-5 glass-panel text-white border border-white/20 rounded-2xl font-black text-xs uppercase tracking-widest btn-hover">Our Menu</button>
                                        </div>
                                    </div>
                                </header>

                                <section id="cookies-section" className="scroll-mt-32 space-y-12 md:space-y-16">
                                    <div className="flex flex-col md:flex-row justify-between items-center md:items-end gap-6 border-b border-[#F2E8DF] pb-10 text-center md:text-left">
                                        <div className="space-y-3">
                                            <span className="text-[10px] font-black uppercase tracking-[0.4em] text-[#D4A373]">Fresh from the oven</span>
                                            <h2 className="text-4xl md:text-6xl font-black text-[#4A3728] tracking-tighter">Signature Cookies</h2>
                                        </div>
                                        <p className="text-[#A09184] max-w-xs text-sm italic font-medium hidden md:block">Baking with 100% organic butter and premium cocoa.</p>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10">
                                        {COOKIES.map(cookie => (
                                            <div key={cookie.id} className="group cookie-card bg-white rounded-[2rem] md:rounded-[2.5rem] border border-[#F2E8DF] p-5 md:p-6 hover:shadow-2xl transition-all duration-500">
                                                <div className="relative aspect-square mb-6 md:mb-8 overflow-hidden rounded-[1.5rem] md:rounded-[2rem]">
                                                    <div className="absolute inset-0 bg-[#FAF9F6] flex items-center justify-center p-8 md:p-12">
                                                        <ProductImage 
                                                            src={cookie.imageSrc} 
                                                            color={cookie.color} 
                                                            alt={cookie.name} 
                                                            className="product-media" 
                                                        />
                                                    </div>
                                                    {cookie.tag && (
                                                        <div className="absolute top-4 left-4 glass-panel px-3 md:px-4 py-1.5 rounded-full text-[8px] md:text-[9px] font-black uppercase tracking-widest text-[#4A3728]">{cookie.tag}</div>
                                                    )}
                                                </div>
                                                <div className="space-y-4">
                                                    <div className="flex justify-between items-start">
                                                        <h3 className="text-xl md:text-2xl font-black text-[#4A3728] tracking-tight">{cookie.name}</h3>
                                                        <span className="font-black text-base md:text-lg text-[#D4A373] whitespace-nowrap">{cookie.price} <span className="text-[10px]">SEK</span></span>
                                                    </div>
                                                    <p className="text-sm text-[#A09184] leading-relaxed line-clamp-2 md:line-clamp-none">{cookie.desc}</p>
                                                    <button 
                                                        onClick={() => addToCart(cookie.name, cookie.price)}
                                                        className="w-full py-4 bg-[#F5EBE0]/40 text-[#4A3728] rounded-xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-[#4A3728] hover:text-white transition-all active:scale-95"
                                                    >
                                                        Add to bag
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {view === 'cakes' && (
                            <div className="max-w-7xl mx-auto space-y-12 md:space-y-20 animate-in pt-6">
                                <header className="text-center space-y-4 md:space-y-6 max-w-3xl mx-auto">
                                    <span className="text-[10px] font-black uppercase tracking-[0.5em] text-[#D4A373]">Specialty Collection</span>
                                    <h1 className="text-4xl md:text-7xl font-black text-[#4A3728] tracking-tighter">Cakes & Jars</h1>
                                    <p className="text-base md:text-lg text-[#A09184] leading-relaxed">Layered with fresh Swedish cream and high-quality infusions.</p>
                                </header>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-12">
                                    {CAKES.map(cake => (
                                        <div key={cake.id} className="bg-white rounded-[2.5rem] overflow-hidden border border-[#F2E8DF] hover:shadow-xl transition-shadow group">
                                            <div className="aspect-[16/10] bg-[#FAF9F6] flex items-center justify-center p-8 relative">
                                                <div className="w-24 h-24 md:w-32 md:h-32 group-hover:rotate-12 transition-transform duration-700">
                                                    <ProductImage src={cake.imageSrc} color={cake.color} alt={cake.name} />
                                                </div>
                                                <div className="absolute top-6 left-6"><span className="bg-white/90 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest shadow-sm">{cake.tag}</span></div>
                                            </div>
                                            <div className="p-6 md:p-8 space-y-4 md:space-y-5">
                                                <div className="flex justify-between items-center">
                                                    <h3 className="text-xl md:text-2xl font-black text-[#4A3728]">{cake.name}</h3>
                                                    <span className="text-[#D4A373] font-black text-sm md:text-base">{cake.price} SEK</span>
                                                </div>
                                                <p className="text-sm text-[#A09184] leading-relaxed line-clamp-2 md:line-clamp-none">{cake.desc}</p>
                                                <button onClick={() => addToCart(cake.name, cake.price)} className="w-full py-4 md:py-5 bg-[#4A3728] text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-[#D4A373] transition-colors flex items-center justify-center gap-2 active:scale-95"><Icon name="Plus" size={16} /> Add to bag</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'shop' && (
                            <div className="max-w-7xl mx-auto animate-in pt-6 md:pt-10">
                                {!selectedBoxSize ? (
                                    <div className="space-y-12 md:space-y-16">
                                        <div className="text-center space-y-4">
                                            <h2 className="text-4xl md:text-5xl font-black text-[#4A3728] tracking-tighter">Curate Your Fika Box</h2>
                                            <p className="text-[#A09184]">Pick a size and fill it with your favorite flavors.</p>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8 max-w-5xl mx-auto">
                                            {BOX_OPTIONS.map(box => (
                                                <button key={box.size} onClick={() => setSelectedBoxSize(box.size)} className="bg-white p-8 md:p-10 rounded-[2.5rem] md:rounded-[3rem] border-2 border-[#F2E8DF] hover:border-[#D4A373] transition-all group text-left space-y-6 md:space-y-8">
                                                    <div className="flex justify-between items-start">

                                            </div>
                                        ))}

                                    {/* Google Review Section */}

                                        <div className="absolute top-0 right-0 w-full h-full opacity-5 pointer-events-none">
                                            <div className="grid grid-cols-6 gap-4 rotate-12 scale-150">

        root.render(<App />);
